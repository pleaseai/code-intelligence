name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    runs-on: [self-hosted, X64, Linux, aws, ubuntu, ubuntu-2404]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

  typecheck:
    runs-on: [self-hosted, X64, Linux, aws, ubuntu, ubuntu-2404]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

  test:
    runs-on: [self-hosted, X64, Linux, aws, ubuntu, ubuntu-2404]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test

      - name: Generate coverage reports
        run: |
          cd packages/lsp && bun test --coverage --coverage-reporter=lcov
          cd ../code && bun test --coverage --coverage-reporter=lcov || true
          cd ../dora && bun test --coverage --coverage-reporter=lcov || true
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: |
            ./packages/lsp/coverage/lcov.info
            ./packages/code/coverage/lcov.info
            ./packages/dora/coverage/lcov.info
          fail_ci_if_error: false
