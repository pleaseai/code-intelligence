# mise.toml — pinned tool versions and common tasks
# Usage: `mise trust && mise install`, then `mise run <task>`

[tools]
node = "24"
bun = "1.3.5"

[tasks.dev]
description = "Run development mode (watch)"
run = "bun run dev"

[tasks.build]
description = "Build for distribution"
run = "bun run build"

[tasks.lint]
description = "Lint with ESLint"
run = "bun run lint"

[tasks.typecheck]
description = "Type check with TypeScript"
run = "bun run typecheck"

[tasks.test]
description = "Run tests with Bun"
run = "bun run test"

[tasks.check]
description = "Run lint, typecheck, and test"
depends = [
  "lint",
  "typecheck",
  "test"
]
